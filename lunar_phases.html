<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月亮圓缺變化（月相）- 高中地科互動教學</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Tab Navigation */
        .tab-navigation {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab-btn {
            flex: 1;
            padding: 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn:hover {
            background: #e9ecef;
            color: #667eea;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom: 4px solid #667eea;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 區塊一：軌道模擬器 */
        .simulator-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .canvas-wrapper {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        #orbitCanvas {
            border: 2px solid #ddd;
            border-radius: 5px;
            background: radial-gradient(circle, #fff, #f0f0f0);
            cursor: grab;
            max-width: 100%;
        }

        #orbitCanvas:active {
            cursor: grabbing;
        }

        .preview-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }

        .preview-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .moon-preview {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            border: 2px solid #ddd;
            overflow: hidden;
        }

        .moon-preview-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info-card {
            background: white;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1.3em;
            color: #333;
            margin-top: 5px;
            font-weight: 600;
        }

        .controls {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e9ecef;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary.active {
            background: #764ba2;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-label {
            font-weight: 600;
            color: #333;
        }

        .speed-buttons {
            display: flex;
            gap: 5px;
        }

        .speed-btn {
            padding: 8px 12px;
            background: #e9ecef;
            color: #666;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .speed-btn.active {
            background: #667eea;
            color: white;
        }

        .speed-btn:hover {
            background: #d0d3d9;
        }

        /* 區塊二：月相圖鑑 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .phase-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .phase-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .phase-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phase-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .phase-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .phase-date {
            font-size: 0.95em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .phase-description {
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
        }

        .gallery-note {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .gallery-note-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .gallery-note-content {
            color: #666;
            line-height: 1.6;
            font-size: 0.95em;
        }

        /* 區塊三：小測驗 */
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .quiz-progress {
            background: #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .progress-text {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }

        .quiz-question {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            display: none;
        }

        .quiz-question.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-image {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            display: block;
            border-radius: 5px;
        }

        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            font-size: 1em;
            text-align: left;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .option input[type="radio"] {
            margin-right: 10px;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feedback.correct {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }

        .quiz-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        .quiz-results {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            display: none;
        }

        .quiz-results.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .results-score {
            font-size: 3em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }

        .results-feedback {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .results-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1em;
        }

        @media (max-width: 1024px) {
            .simulator-container {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .tab-btn {
                font-size: 0.95em;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .tab-content {
                padding: 20px;
            }

            .header {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .button-group {
                flex-wrap: wrap;
            }

            .speed-control {
                flex-wrap: wrap;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 月亮圓缺變化 - 月相</h1>
            <p>高中地球科學互動教學</p>
        </div>

        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="simulator">軌道模擬器</button>
            <button class="tab-btn" data-tab="gallery">月相圖鑑</button>
            <button class="tab-btn" data-tab="quiz">小測驗</button>
        </div>

        <!-- 區塊一：軌道模擬器 -->
        <div class="tab-content active" id="simulator">
            <div class="simulator-container">
                <div>
                    <h2 style="margin-bottom: 20px; color: #333;">俯視軌道圖</h2>
                    <div class="canvas-wrapper">
                        <canvas id="orbitCanvas" width="500" height="500"></canvas>
                    </div>
                    <div class="controls">
                        <div class="button-group">
                            <button class="btn-primary" id="playBtn">▶ 播放</button>
                            <button class="btn-primary" id="pauseBtn" style="display: none;">⏸ 暫停</button>
                            <button class="btn-primary" id="resetBtn">↻ 重置</button>
                        </div>
                        <div class="speed-control">
                            <span class="speed-label">播放速度：</span>
                            <div class="speed-buttons">
                                <button class="speed-btn active" data-speed="1">×1</button>
                                <button class="speed-btn" data-speed="2">×2</button>
                                <button class="speed-btn" data-speed="3">×3</button>
                                <button class="speed-btn" data-speed="5">×5</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="preview-section">
                        <div class="preview-title">地球上看到的月相</div>
                        <div class="moon-preview">
                            <canvas class="moon-preview-canvas" width="200" height="200"></canvas>
                        </div>
                        <div class="info-card">
                            <div class="info-label">月相名稱</div>
                            <div class="info-value" id="phaseName">新月</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">農曆日期</div>
                            <div class="info-value" id="lunarDate">初一</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">軌道角度</div>
                            <div class="info-value" id="orbitAngle">0°</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">可見光面</div>
                            <div class="info-value" id="illumination">0%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 區塊二：月相圖鑑 -->
        <div class="tab-content" id="gallery">
            <h2 style="margin-bottom: 30px; color: #333;">八大月相</h2>
            <div class="gallery-grid" id="galleryGrid"></div>

            <div class="gallery-note">
                <div class="gallery-note-title">📌 月相辨識口訣</div>
                <div class="gallery-note-content">
                    <strong>D形與C形判斷法：</strong><br>
                    • 上弦月：發亮部分形似「D」，月球右側明亮<br>
                    • 下弦月：發亮部分形似「C」，月球左側明亮<br>
                    • 新月：看不到月球<br>
                    • 滿月：整個月球明亮呈圓形<br><br>
                    <strong>記憶妙訣：</strong> 「初三五（眉月），初七八（上弦），十五圓（滿月），二十二三（下弦）」
                </div>
            </div>
        </div>

        <!-- 區塊三：小測驗 -->
        <div class="tab-content" id="quiz">
            <h2 style="margin-bottom: 30px; color: #333;">月相學習測驗</h2>

            <div class="quiz-progress">
                <div class="progress-text">進度：<span id="quizProgress">1</span> / 6</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <div id="quizContainer"></div>

            <div class="quiz-results" id="quizResults">
                <div class="results-score" id="finalScore">100分</div>
                <div class="results-feedback" id="resultsFeedback">太棒了！</div>
                <div class="results-description" id="resultsDescription"></div>
                <button class="btn-primary" onclick="resetQuiz()">重新作答</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 全局變數 ============
        const phaseNames = ['新月', '眉月', '上弦月', '盈凸月', '滿月', '虧凸月', '下弦月', '殘月'];
        const lunarDates = ['初一', '初七', '初八', '十四', '十五', '二十一', '二十二', '二十八'];
        const phaseDescriptions = [
            '月球位於太陽和地球之間，看不到月光的一面',
            '月球公轉初期，可見右側細月牙',
            '月球公轉至地球北側，可見右半部明亮',
            '滿月前，月球大部分明亮',
            '月球位於地球和太陽之間，整面光亮',
            '滿月後，月球大部分明亮',
            '月球公轉至地球南側，可見左半部明亮',
            '月球公轉末期，可見左側細月牙'
        ];

        let moonAngle = 0;
        let isPlaying = false;
        let speed = 1;
        let animationId = null;

        // ============ 區塊一：軌道模擬器 ============
        const canvas = document.getElementById('orbitCanvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.querySelector('.moon-preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');

        const sunRadius = 20;
        const earthRadius = 15;
        const moonRadius = 5;
        const orbitRadius = 150;

        function drawOrbit() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 清空畫布
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製背景
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製軌道
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
            ctx.stroke();

            // 繪製太陽
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(centerX - 100, centerY, sunRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☀', centerX - 100, centerY);

            // 繪製地球
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.arc(centerX, centerY, earthRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#2E7D32';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🌍', centerX, centerY);

            // 計算月球位置
            const moonX = centerX + Math.cos((moonAngle * Math.PI) / 180) * orbitRadius;
            const moonY = centerY + Math.sin((moonAngle * Math.PI) / 180) * orbitRadius;

            // 繪製月球
            ctx.fillStyle = '#E0E0E0';
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius + 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 月球光亮面
            const phaseIndex = Math.round((moonAngle / 360) * 8) % 8;
            drawMoonPhase(moonX, moonY, moonAngle, moonRadius);

            // 標示月球
            ctx.fillStyle = '#333';
            ctx.font = 'bold 8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🌙', moonX, moonY - 10);

            updatePhaseInfo();
        }

        function drawMoonPhase(x, y, angle, radius) {
            // 繪製月球在軌道上的相位
            const normalizedAngle = ((angle % 360) + 360) % 360;
            
            // 計算太陽到月球的方向
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const sunX = centerX - 100;
            
            const moonToSunX = sunX - x;
            const moonToSunY = centerY - y;
            const sunAngle = Math.atan2(moonToSunY, moonToSunX);
            
            // 繪製光亮面
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x, y, radius, sunAngle - Math.PI / 2, sunAngle + Math.PI / 2, false);
            ctx.lineTo(x, y);
            ctx.fill();
        }

        function updatePhaseInfo() {
            const phaseIndex = Math.round((moonAngle / 360) * 8) % 8;
            const illumination = calculateIllumination(moonAngle);
            
            document.getElementById('phaseName').textContent = phaseNames[phaseIndex];
            document.getElementById('lunarDate').textContent = lunarDates[phaseIndex];
            document.getElementById('orbitAngle').textContent = Math.round(moonAngle) + '°';
            document.getElementById('illumination').textContent = Math.round(illumination) + '%';

            // 繪製月相預覽
            drawMoonPreview(phaseIndex, illumination);
        }

        function calculateIllumination(angle) {
            const normalizedAngle = ((angle % 360) + 360) % 360;
            // 新月（0度）=0%，滿月（180度）=100%
            if (normalizedAngle <= 180) {
                return (normalizedAngle / 180) * 100;
            } else {
                return ((360 - normalizedAngle) / 180) * 100;
            }
        }

        function drawMoonPreview(phaseIndex, illumination) {
            const x = previewCanvas.width / 2;
            const y = previewCanvas.height / 2;
            const radius = 80;

            // 清空
            previewCtx.fillStyle = '#f0f0f0';
            previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

            // 繪製月球背景
            previewCtx.fillStyle = '#e0e0e0';
            previewCtx.beginPath();
            previewCtx.arc(x, y, radius, 0, Math.PI * 2);
            previewCtx.fill();

            // 繪製光亮面
            previewCtx.fillStyle = '#FFD700';
            
            if (illumination > 2 && illumination < 98) {
                // 上弦月或下弦月
                const phaseAngle = (moonAngle / 360) * Math.PI * 2;
                
                if (phaseIndex === 1 || phaseIndex === 2 || phaseIndex === 3) {
                    // 眉月、上弦月、盈凸月 - 右側亮
                    previewCtx.beginPath();
                    previewCtx.arc(x, y, radius, -Math.PI / 2, Math.PI / 2, false);
                    previewCtx.lineTo(x, y);
                    previewCtx.fill();
                } else if (phaseIndex === 5 || phaseIndex === 6 || phaseIndex === 7) {
                    // 虧凸月、下弦月、殘月 - 左側亮
                    previewCtx.beginPath();
                    previewCtx.arc(x, y, radius, Math.PI / 2, -Math.PI / 2, false);
                    previewCtx.lineTo(x, y);
                    previewCtx.fill();
                }
            } else if (illumination >= 98) {
                // 滿月
                previewCtx.beginPath();
                previewCtx.arc(x, y, radius, 0, Math.PI * 2);
                previewCtx.fill();
            }
            // 新月時什麼都不畫

            // 邊框
            previewCtx.strokeStyle = '#666';
            previewCtx.lineWidth = 2;
            previewCtx.beginPath();
            previewCtx.arc(x, y, radius, 0, Math.PI * 2);
            previewCtx.stroke();
        }

        function animate() {
            if (isPlaying) {
                moonAngle = (moonAngle + 0.2 * speed) % 360;
            }
            drawOrbit();
            animationId = requestAnimationFrame(animate);
        }

        // 滑鼠拖曳功能
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
            moonAngle = (angle + 90 + 360) % 360;
            isPlaying = false;
            updatePlayButton();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                const angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
                moonAngle = (angle + 90 + 360) % 360;
            }
        });

        // 觸控拖曳功能
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
            moonAngle = (angle + 90 + 360) % 360;
            isPlaying = false;
            updatePlayButton();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
            moonAngle = (angle + 90 + 360) % 360;
        });

        function updatePlayButton() {
            if (isPlaying) {
                document.getElementById('playBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';
            } else {
                document.getElementById('playBtn').style.display = 'inline-block';
                document.getElementById('pauseBtn').style.display = 'none';
            }
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            isPlaying = true;
            updatePlayButton();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPlaying = false;
            updatePlayButton();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            moonAngle = 0;
            isPlaying = false;
            updatePlayButton();
        });

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                speed = parseInt(btn.dataset.speed);
            });
        });

        // ============ 區塊二：月相圖鑑 ============
        function initGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            galleryGrid.innerHTML = '';

            phaseNames.forEach((name, index) => {
                const card = document.createElement('div');
                card.className = 'phase-card';
                card.innerHTML = `
                    <div class="phase-circle">
                        <canvas class="phase-canvas" width="120" height="120" data-phase="${index}"></canvas>
                    </div>
                    <div class="phase-name">${name}</div>
                    <div class="phase-date">${lunarDates[index]}</div>
                    <div class="phase-description">${phaseDescriptions[index]}</div>
                `;

                card.addEventListener('click', () => {
                    moonAngle = (index / 8) * 360;
                    isPlaying = false;
                    updatePlayButton();
                    switchTab('simulator');
                });

                galleryGrid.appendChild(card);

                // 繪製月相圖示
                setTimeout(() => {
                    const phaseCanvas = card.querySelector('.phase-canvas');
                    const phaseCtx = phaseCanvas.getContext('2d');
                    drawPhaseCircle(phaseCtx, index, 60, 60, 50);
                }, 0);
            });
        }

        function drawPhaseCircle(ctx, phaseIndex, x, y, radius) {
            // 背景
            ctx.fillStyle = '#e0e0e0';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();

            // 光亮面
            ctx.fillStyle = '#FFD700';
            
            if (phaseIndex === 0) {
                // 新月 - 不畫
            } else if (phaseIndex === 1) {
                // 眉月 - 右側細弧
                ctx.beginPath();
                ctx.arc(x + radius * 0.6, y, radius * 0.3, -Math.PI / 4, Math.PI / 4);
                ctx.lineTo(x, y);
                ctx.fill();
            } else if (phaseIndex === 2) {
                // 上弦月 - 右半圓
                ctx.beginPath();
                ctx.arc(x, y, radius, -Math.PI / 2, Math.PI / 2, false);
                ctx.lineTo(x, y);
                ctx.fill();
            } else if (phaseIndex === 3) {
                // 盈凸月 - 右側大弧
                ctx.beginPath();
                ctx.arc(x, y, radius, -Math.PI / 2, Math.PI / 2, false);
                ctx.lineTo(x, y);
                ctx.fill();
            } else if (phaseIndex === 4) {
                // 滿月 - 全圓
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            } else if (phaseIndex === 5) {
                // 虧凸月 - 左側大弧
                ctx.beginPath();
                ctx.arc(x, y, radius, Math.PI / 2, -Math.PI / 2, false);
                ctx.lineTo(x, y);
                ctx.fill();
            } else if (phaseIndex === 6) {
                // 下弦月 - 左半圓
                ctx.beginPath();
                ctx.arc(x, y, radius, Math.PI / 2, -Math.PI / 2, false);
                ctx.lineTo(x, y);
                ctx.fill();
            } else if (phaseIndex === 7) {
                // 殘月 - 左側細弧
                ctx.beginPath();
                ctx.arc(x - radius * 0.6, y, radius * 0.3, Math.PI - Math.PI / 4, Math.PI + Math.PI / 4);
                ctx.lineTo(x, y);
                ctx.fill();
            }

            // 邊框
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();
        }

        // ============ 區塊三：小測驗 ============
        const quizData = [
            {
                type: 'image',
                question: '下圖所示是哪一種月相？',
                image: 4, // 滿月
                options: ['新月', '上弦月', '滿月', '下弦月'],
                correct: 2,
                explanation: '圖中整個月球都發光呈圓形，這是滿月。滿月出現在農曆十五日左右，月球位於地球和太陽之間的相反一側。'
            },
            {
                type: 'text',
                question: '農曆初八左右看到的月相是哪一種？',
                options: ['新月', '上弦月', '眉月', '盈凸月'],
                correct: 1,
                explanation: '農曆初八左右，月球公轉到地球北側，可見右半部明亮，這是上弦月。用「D形判斷法」可以識別：亮面形似字母「D」。'
            },
            {
                type: 'image',
                question: '這是哪一種月相？月球左側明亮。',
                image: 6, // 下弦月
                options: ['上弦月', '下弦月', '滿月', '眉月'],
                correct: 1,
                explanation: '月球左側明亮，發亮部分形似字母「C」，這是下弦月。下弦月出現在農曆二十二、二十三日左右。'
            },
            {
                type: 'text',
                question: '月球距離太陽和地球之間最近時，應該看到哪種月相？',
                options: ['新月', '滿月', '上弦月', '下弦月'],
                correct: 0,
                explanation: '當月球位於太陽和地球之間時，月球朝向我們的一面（背對太陽）完全處於黑暗中，看不到月光，這就是新月。新月出現在農曆初一左右。'
            },
            {
                type: 'text',
                question: '農曆十五日左右能看到的月相是什麼？此時月球在軌道上的位置相對於地球和太陽是什麼？',
                options: [
                    '新月；月球在地球和太陽之間',
                    '滿月；月球在地球和太陽之間的相反一側',
                    '滿月；月球在地球和太陽之間',
                    '上弦月；月球在地球北側'
                ],
                correct: 1,
                explanation: '農曆十五日左右是滿月，此時月球位於地球和太陽之間的相反一側。從地球看，整個月球都受到太陽照亮，所以看到圓形的滿月。'
            },
            {
                type: 'text',
                question: '如何用「D形/C形判斷法」快速分辨上弦月和下弦月？',
                options: [
                    '上弦月形似D，下弦月形似C',
                    '上弦月形似C，下弦月形似D',
                    '無法區分',
                    '需要看日期才能分辨'
                ],
                correct: 0,
                explanation: '這是辨識月相最實用的口訣！上弦月時，亮面位於右側，整體形狀像字母「D」。下弦月時，亮面位於左側，整體形狀像字母「C」。記住這個方法可以快速判斷。'
            }
        ];

        let currentQuestion = 0;
        const userAnswers = [];

        function initQuiz() {
            const quizContainer = document.getElementById('quizContainer');
            quizContainer.innerHTML = '';

            quizData.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'quiz-question' + (index === 0 ? ' active' : '');
                questionDiv.innerHTML = `
                    <div class="question-number">第 ${index + 1} 題 / 共 6 題</div>
                    <div class="question-text">${q.question}</div>
                    ${q.type === 'image' ? `<div style="width: 100%; text-align: center; margin: 20px 0;">
                        <canvas id="qImage${index}" width="200" height="200" style="max-width: 100%; border: 1px solid #ddd; border-radius: 5px;"></canvas>
                    </div>` : ''}
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <label class="option">
                                <input type="radio" name="q${index}" value="${i}" data-question="${index}">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="feedback"></div>
                    <div class="quiz-buttons">
                        ${index > 0 ? '<button class="btn-primary" onclick="previousQuestion()">上一題</button>' : ''}
                        ${index < quizData.length - 1 ? '<button class="btn-primary" onclick="nextQuestion()">下一題</button>' : '<button class="btn-primary" onclick="submitQuiz()">提交</button>'}
                    </div>
                `;

                quizContainer.appendChild(questionDiv);

                // 繪製圖片題的月相
                if (q.type === 'image') {
                    setTimeout(() => {
                        const canvas = document.getElementById(`qImage${index}`);
                        const ctx = canvas.getContext('2d');
                        drawPhaseCircle(ctx, q.image, 100, 100, 80);
                    }, 0);
                }
            });

            // 綁定選項事件
            document.querySelectorAll('input[type="radio"]').forEach(input => {
                input.addEventListener('change', (e) => {
                    const questionIndex = parseInt(e.target.dataset.question);
                    userAnswers[questionIndex] = parseInt(e.target.value);
                    showFeedback(questionIndex);
                });
            });
        }

        function showFeedback(questionIndex) {
            const question = quizData[questionIndex];
            const selectedAnswer = userAnswers[questionIndex];
            const questionDiv = document.querySelectorAll('.quiz-question')[questionIndex];
            const feedbackDiv = questionDiv.querySelector('.feedback');
            const options = questionDiv.querySelectorAll('label.option');

            // 移除所有選項的樣式
            options.forEach(opt => {
                opt.classList.remove('correct', 'incorrect', 'disabled');
            });

            // 標示正確和錯誤的選項
            options.forEach((opt, index) => {
                opt.classList.add('disabled');
                if (index === question.correct) {
                    opt.classList.add('correct');
                }
                if (index === selectedAnswer && selectedAnswer !== question.correct) {
                    opt.classList.add('incorrect');
                }
            });

            // 顯示反饋
            const isCorrect = selectedAnswer === question.correct;
            feedbackDiv.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
            feedbackDiv.innerHTML = `
                <div class="feedback-title">${isCorrect ? '✓ 正確' : '✗ 錯誤'}</div>
                <div>${question.explanation}</div>
            `;
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                document.querySelectorAll('.quiz-question')[currentQuestion].classList.remove('active');
                currentQuestion++;
                document.querySelectorAll('.quiz-question')[currentQuestion].classList.add('active');
                updateProgress();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                document.querySelectorAll('.quiz-question')[currentQuestion].classList.remove('active');
                currentQuestion--;
                document.querySelectorAll('.quiz-question')[currentQuestion].classList.add('active');
                updateProgress();
            }
        }

        function updateProgress() {
            document.getElementById('quizProgress').textContent = currentQuestion + 1;
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.querySelector('.progress-fill').style.width = progress + '%';
        }

        function submitQuiz() {
            // 檢查是否都已作答
            if (userAnswers.length < quizData.length) {
                alert('請答完所有題目後再提交！');
                return;
            }

            let score = 0;
            userAnswers.forEach((answer, index) => {
                if (answer === quizData[index].correct) {
                    score++;
                }
            });

            const percentage = Math.round((score / quizData.length) * 100);
            const scoreText = percentage >= 90 ? '太棒了！' :
                             percentage >= 80 ? '很不錯！' :
                             percentage >= 70 ? '不錯呢！' :
                             percentage >= 60 ? '再加油！' : '需要多複習！';

            const description = percentage >= 90 ? '你對月相的理解已經非常深入了！' :
                               percentage >= 80 ? '你掌握了月相的大多數概念。' :
                               percentage >= 70 ? '你對月相有基本的了解。' :
                               percentage >= 60 ? '你需要加強某些月相概念的理解。' :
                               '建議你重新學習月相的相關內容。';

            document.getElementById('finalScore').textContent = percentage + '分';
            document.getElementById('resultsFeedback').textContent = scoreText;
            document.getElementById('resultsDescription').textContent = `您答對了 ${score} / ${quizData.length} 題。${description}`;

            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('quizResults').classList.add('show');
        }

        function resetQuiz() {
            currentQuestion = 0;
            userAnswers.length = 0;
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('quizResults').classList.remove('show');
            initQuiz();
            updateProgress();
        }

        // ============ 標籤頁切換 ============
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });

        // ============ 初始化 ============
        window.addEventListener('DOMContentLoaded', () => {
            animate();
            initGallery();
            initQuiz();
            updateProgress();
        });
    </script>
</body>
</html>

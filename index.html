<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月亮圓缺變化（月相）互動教學</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1428 0%, #1a3a52 50%, #0f2942 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(65, 105, 225, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(30, 144, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(15, 30, 50, 0.85);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 30px rgba(65, 105, 225, 0.3);
            overflow: hidden;
            border: 1px solid rgba(65, 105, 225, 0.3);
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 2px solid rgba(65, 105, 225, 0.5);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid rgba(65, 105, 225, 0.3);
            background: rgba(10, 20, 40, 0.5);
        }

        .tab-button {
            flex: 1;
            padding: 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            color: rgba(200, 200, 200, 0.7);
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .tab-button:hover {
            background: rgba(65, 105, 225, 0.1);
            color: rgba(200, 200, 200, 0.9);
        }

        .tab-button.active {
            color: #4189ff;
            border-bottom-color: #4189ff;
            background: rgba(65, 105, 225, 0.2);
        }

        .tab-content {
            display: none;
            padding: 40px;
            animation: fadeIn 0.3s ease;
            color: rgba(200, 220, 240, 0.9);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 區塊一：軌道模擬器 */
        .simulator-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            align-items: start;
        }

        .canvas-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #orbitCanvas {
            border: 3px solid #667eea;
            border-radius: 10px;
            background: #1a1a2e;
            cursor: grab;
            width: 100%;
            max-width: 600px;
        }

        #orbitCanvas:active {
            cursor: grabbing;
        }

        .moon-preview {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .preview-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        #moonPreview {
            width: 100%;
            height: 250px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-canvas {
            width: 200px;
            height: 200px;
        }

        .info-card {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.6) 0%, rgba(42, 82, 152, 0.6) 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #4189ff;
            border: 1px solid rgba(65, 105, 225, 0.3);
        }

        .info-card h3 {
            color: #4189ff;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(65, 105, 225, 0.2);
            font-size: 0.95em;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: rgba(150, 180, 220, 0.8);
        }

        .info-value {
            color: #4189ff;
            font-weight: 500;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-width: 120px;
            border: 1px solid rgba(65, 105, 225, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(65, 105, 225, 0.5), 0 0 10px rgba(65, 105, 225, 0.3);
            background: linear-gradient(135deg, #2a5298 0%, #3a6ab3 100%);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 60, 114, 0.6);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid rgba(65, 105, 225, 0.3);
        }

        .speed-control label {
            font-weight: 600;
            color: rgba(150, 180, 220, 0.8);
        }

        .speed-control select {
            padding: 6px 10px;
            border: 1px solid rgba(65, 105, 225, 0.5);
            border-radius: 5px;
            cursor: pointer;
            background: rgba(10, 20, 40, 0.8);
            color: #4189ff;
        }

        /* 區塊二：月相圖鑑 */
        .phases-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .phases-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .phases-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .phase-card {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.5) 0%, rgba(42, 82, 152, 0.5) 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(65, 105, 225, 0.2);
        }

        .phase-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(65, 105, 225, 0.3), 0 0 15px rgba(65, 105, 225, 0.2);
            border-color: #4189ff;
            background: linear-gradient(135deg, rgba(42, 82, 152, 0.7) 0%, rgba(65, 105, 225, 0.7) 100%);
        }

        .phase-canvas {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phase-card h3 {
            font-size: 1.2em;
            color: #4189ff;
            margin-bottom: 8px;
        }

        .phase-card p {
            font-size: 0.9em;
            color: rgba(150, 180, 220, 0.8);
            margin-bottom: 8px;
        }

        .lunar-date {
            font-size: 0.85em;
            color: #4189ff;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .phase-description {
            font-size: 0.85em;
            color: rgba(150, 180, 220, 0.8);
            line-height: 1.4;
        }

        .mnemonic {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.1) 0%, rgba(255, 152, 0, 0.1) 100%);
            border-left: 4px solid #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .mnemonic h3 {
            color: #ffb74d;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .mnemonic-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 0.95em;
            line-height: 1.6;
            color: rgba(150, 180, 220, 0.8);
        }

        /* 區塊三：小測驗 */
        .quiz-container {
            max-width: 900px;
        }

        .quiz-question {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.5) 0%, rgba(42, 82, 152, 0.5) 100%);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 5px solid #4189ff;
            border: 1px solid rgba(65, 105, 225, 0.3);
            display: none;
            color: rgba(200, 220, 240, 0.9);
        }

        .quiz-question.active {
            display: block;
        }

        .question-number {
            color: #4189ff;
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.1em;
            color: rgba(200, 220, 240, 0.9);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-image {
            text-align: center;
            margin: 20px 0;
        }

        .question-image canvas {
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid rgba(65, 105, 225, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(10, 20, 40, 0.4);
            text-align: left;
            font-size: 1em;
            position: relative;
            padding-left: 45px;
            color: rgba(200, 220, 240, 0.8);
        }

        .option input[type="radio"] {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .option:hover {
            border-color: #4189ff;
            background: rgba(30, 60, 114, 0.5);
            color: rgba(200, 220, 240, 0.9);
        }

        .option.selected {
            border-color: #4189ff;
            background: rgba(65, 105, 225, 0.3);
            color: rgba(200, 220, 240, 0.9);
        }

        .option.correct {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .option.incorrect {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.2);
            color: #ef9a9a;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .explanation.show {
            display: block;
        }

        .explanation.correct {
            background: rgba(76, 175, 80, 0.15);
            border-left: 4px solid #4caf50;
            color: #81c784;
        }

        .explanation.incorrect {
            background: rgba(244, 67, 54, 0.15);
            border-left: 4px solid #f44336;
            color: #ef9a9a;
        }

        .quiz-navigation {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quiz-progress {
            text-align: center;
            margin-bottom: 25px;
            color: rgba(150, 180, 220, 0.8);
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(30, 60, 114, 0.6);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            border: 1px solid rgba(65, 105, 225, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(65, 105, 225, 0.5);
        }

        .results {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 1px solid rgba(65, 105, 225, 0.5);
            box-shadow: 0 0 30px rgba(65, 105, 225, 0.3);
        }

        .results.show {
            display: block;
        }

        .results h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .score {
            font-size: 3.5em;
            font-weight: bold;
            margin: 20px 0;
        }

        .results p {
            font-size: 1.1em;
            margin: 15px 0;
            opacity: 0.95;
        }

        .feedback {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.05em;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #4189ff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .observer-info {
            background: rgba(30, 60, 114, 0.6);
            border: 1px solid rgba(65, 105, 225, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            color: rgba(150, 180, 220, 0.8);
            font-size: 0.9em;
        }

        .observer-info strong {
            color: #4189ff;
        }

        .tidal-info {
            background: linear-gradient(135deg, rgba(100, 149, 237, 0.1) 0%, rgba(30, 144, 255, 0.1) 100%);
            border-left: 4px solid #4169e1;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.85em;
            color: rgba(150, 180, 220, 0.8);
        }

        .moon-trail {
            position: absolute;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .simulator-container {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .tab-button {
                padding: 15px 10px;
                font-size: 0.95em;
            }

            .tab-content {
                padding: 20px;
            }

            .phases-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 月亮圓缺變化（月相）</h1>
            <p>互動式高中地科教學平台</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(0)">軌道模擬器</button>
            <button class="tab-button" onclick="switchTab(1)">月相圖鑑</button>
            <button class="tab-button" onclick="switchTab(2)">小測驗</button>
        </div>

        <!-- 區塊一：軌道模擬器 -->
        <div id="tab0" class="tab-content active">
            <div class="simulator-container">
                <div class="canvas-area">
                    <canvas id="orbitCanvas" width="600" height="600"></canvas>
                    <div class="controls">
                        <div class="control-group">
                            <button class="btn-primary" id="playBtn" onclick="togglePlay()">▶ 播放</button>
                            <div class="speed-control">
                                <label>速度：</label>
                                <select id="speedSelect" onchange="changeSpeed()">
                                    <option value="1">×1</option>
                                    <option value="2">×2</option>
                                    <option value="3">×3</option>
                                    <option value="4">×4</option>
                                    <option value="5">×5</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="moon-preview">
                    <div class="preview-title">地球上看到的月相</div>
                    <div id="moonPreview">
                        <canvas id="moonPhasePreview" class="preview-canvas"></canvas>
                    </div>

                    <div class="info-card">
                        <h3>📋 月相資訊</h3>
                        <div class="info-item">
                            <span class="info-label">月相名稱：</span>
                            <span class="info-value" id="phaseName">新月</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">農曆日期：</span>
                            <span class="info-value" id="lunarDate">初一</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">軌道角度：</span>
                            <span class="info-value" id="orbitAngle">0°</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">可見光面：</span>
                            <span class="info-value" id="illumination">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 區塊二：月相圖鑑 -->
        <div id="tab1" class="tab-content">
            <div class="phases-grid" id="phasesGrid"></div>

            <div class="mnemonic">
                <h3>💡 月相辨識口訣（D形/C形判斷法）</h3>
                <div class="mnemonic-content">
                    <div>
                        <strong>🅳 D形 ＝ 上弦月（東邊月亮）</strong><br>
                        月球在東方90°<br>
                        形似字母「D」，右邊亮<br>
                        <strong>正午升起、午夜落下</strong><br>
                        可見時段：白天到午夜
                    </div>
                    <div>
                        <strong>🅲 C形 ＝ 下弦月（西邊月亮）</strong><br>
                        月球在西方90°<br>
                        形似字母「C」，左邊亮<br>
                        <strong>午夜升起、正午落下</strong><br>
                        可見時段：午夜到白天
                    </div>
                </div>
            </div>
        </div>

        <!-- 區塊三：小測驗 -->
        <div id="tab2" class="tab-content">
            <div class="quiz-container">
                <div class="quiz-progress">
                    <div id="questionCount">第 1 題 / 共 6 題</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>

                <div id="quizQuestions"></div>

                <div class="results" id="results">
                    <h2>✨ 測驗完成！</h2>
                    <div class="score" id="scoreDisplay">0 分</div>
                    <p id="feedbackMessage">加油！</p>
                    <div class="feedback" id="feedbackDetail"></div>
                    <button class="btn-primary" onclick="resetQuiz()">🔄 重新作答</button>
                </div>

                <div class="quiz-navigation">
                    <button class="btn-primary" id="prevBtn" onclick="prevQuestion()">← 上一題</button>
                    <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
                    <button class="btn-primary" id="submitBtn" onclick="submitQuiz()" style="display:none;">提交答卷</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 月相相關常數和工具函數 ==========
        const PHASES = [
            { name: '新月', lunarDate: '初一', angle: 0, illumination: 0, description: '太陽照射月球背面，無法看見（約29.5天週期的起始）' },
            { name: '眉月', lunarDate: '初三四', angle: 45, illumination: 5, description: '月球稍向東移，可看到月面西邊細細的新月' },
            { name: '上弦月', lunarDate: '初七八', angle: 90, illumination: 50, description: '月球公轉至東方90°，正午升起、午夜落下' },
            { name: '盈凸月', lunarDate: '十四十五', angle: 135, illumination: 90, description: '月球接近滿月，月面大部分被照亮呈隆起狀' },
            { name: '滿月', lunarDate: '十五十六', angle: 180, illumination: 100, description: '月球與太陽在地球兩側相對，整個月面都被照亮' },
            { name: '虧凸月', lunarDate: '二十二三', angle: 225, illumination: 90, description: '滿月後，月面左邊漸漸變暗，呈隆起狀' },
            { name: '下弦月', lunarDate: '廿二廿三', angle: 270, illumination: 50, description: '月球公轉至西方90°，午夜升起、正午落下' },
            { name: '殘月', lunarDate: '廿八廿九', angle: 315, illumination: 5, description: '月球接近新月，只有月面東邊細細的彎邊被照亮' }
        ];

        const PHASE_DESCRIPTIONS = {
            '新月': '月球與太陽在地球同側。太陽照射月球背面，地球上無法看見（朔望月週期約29.5天的起始）。',
            '眉月': '月球稍向東移，可看到月面西邊細細的新月。此時月球剛從新月位置移動。',
            '上弦月': '月球公轉至東方90°，從地球看月面右半邊被照亮，形似字母「D」。正午升起，午夜落下。',
            '盈凸月': '月球接近滿月，月面大部分被照亮呈隆起狀。太陽照射角度變大。',
            '滿月': '月球與太陽在地球兩側相對。整個月面都被太陽直射照亮。',
            '虧凸月': '滿月後，月面左邊漸漸變暗，呈隆起狀。月球繼續公轉，照亮面減少。',
            '下弦月': '月球公轉至西方90°，從地球看月面左半邊被照亮，形似字母「C」。午夜升起，正午落下。',
            '殘月': '月球接近新月，只有月面東邊細細的彎邊被照亮。朔望月週期即將完成。'
        };

        // ========== 全局變數 ==========
        let moonAngle = 0;
        let isPlaying = false;
        let speed = 1;
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let quizSubmitted = false;

        // ========== Canvas 相關函數 ==========
        function drawOrbitSimulator() {
            const canvas = document.getElementById('orbitCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const orbitRadius = 150;

            // 清空背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製星空背景
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 1.5;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // 繪製太陽
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(centerX + 250, centerY, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.lineWidth = 15;
            ctx.stroke();

            // 繪製地球
            const earthRadius = 20;
            ctx.fillStyle = '#4A90E2';
            ctx.beginPath();
            ctx.arc(centerX, centerY, earthRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#2E5C8A';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 繪製大陸（簡化）
            ctx.fillStyle = '#2ECC71';
            ctx.beginPath();
            ctx.arc(centerX - 5, centerY - 5, 5, 0, Math.PI * 2);
            ctx.fill();

            // 繪製月球軌道
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
            ctx.stroke();

            // 繪製月球
            const moonX = centerX + Math.cos((moonAngle * Math.PI) / 180) * orbitRadius;
            const moonY = centerY + Math.sin((moonAngle * Math.PI) / 180) * orbitRadius;

            ctx.fillStyle = '#D3D3D3';
            ctx.beginPath();
            ctx.arc(moonX, moonY, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 繪製隕石坑
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.arc(moonX - 3, moonY - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX + 3, moonY + 2, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // 繪製軌道標記
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('太陽', centerX + 250, centerY + 50);
            ctx.fillText('地球', centerX, centerY + 35);
            ctx.fillText('月球軌道', centerX + orbitRadius + 10, centerY - 10);
        }

        function drawMoonPhase() {
            const canvas = document.getElementById('moonPhasePreview');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 80;

            // 清空背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製月球背面（灰色）
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // 計算照亮面
            const phaseAngle = (moonAngle * Math.PI) / 180;
            const illumination = (Math.cos(phaseAngle) + 1) / 2 * 100;
            
            // 繪製照亮面
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();

            if (illumination > 0.5) {
                // 超過50%用特殊方法
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#999';
                const darkWidth = radius * 2 * (1 - illumination / 100);
                ctx.beginPath();
                ctx.ellipse(centerX - darkWidth / 2, centerY, darkWidth / 2, radius, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 小於50%
                const angle = Math.acos(1 - 2 * illumination / 100);
                ctx.arc(centerX, centerY, radius, -angle, angle);
                ctx.fill();
            }

            // 邊框
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();

            // 更新資訊卡
            updatePhaseInfo(illumination);
        }

        function updatePhaseInfo(illumination) {
            const normalizedAngle = ((moonAngle % 360) + 360) % 360;
            const phaseIndex = Math.round(normalizedAngle / 45) % 8;
            const phase = PHASES[phaseIndex];

            document.getElementById('phaseName').textContent = phase.name;
            document.getElementById('lunarDate').textContent = phase.lunarDate;
            document.getElementById('orbitAngle').textContent = Math.round(normalizedAngle) + '°';
            document.getElementById('illumination').textContent = Math.round(illumination) + '%';
        }

        // ========== 互動功能 ==========
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            btn.textContent = isPlaying ? '⏸ 暫停' : '▶ 播放';
        }

        function changeSpeed() {
            speed = parseInt(document.getElementById('speedSelect').value);
        }

        // 滑鼠拖曳月球
        let isDragging = false;
        let dragStartX, dragStartY, dragStartAngle;

        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('orbitCanvas');

            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                const moonX = centerX + Math.cos((moonAngle * Math.PI) / 180) * 150;
                const moonY = centerY + Math.sin((moonAngle * Math.PI) / 180) * 150;

                const distance = Math.sqrt((x - moonX) ** 2 + (y - moonY) ** 2);
                if (distance < 30) {
                    isDragging = true;
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = '▶ 播放';
                    dragStartX = x;
                    dragStartY = y;
                    dragStartAngle = moonAngle;
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;

                    const angle = Math.atan2(y - centerY, x - centerX) * 180 / Math.PI;
                    moonAngle = angle;
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // 觸控支持
            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                const moonX = centerX + Math.cos((moonAngle * Math.PI) / 180) * 150;
                const moonY = centerY + Math.sin((moonAngle * Math.PI) / 180) * 150;

                const distance = Math.sqrt((x - moonX) ** 2 + (y - moonY) ** 2);
                if (distance < 30) {
                    isDragging = true;
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = '▶ 播放';
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;

                    const angle = Math.atan2(y - centerY, x - centerX) * 180 / Math.PI;
                    moonAngle = angle;
                }
            });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
            });
        });

        // ========== 動畫循環 ==========
        function animate() {
            if (isPlaying) {
                moonAngle = (moonAngle + 0.5 * speed) % 360;
            }

            drawOrbitSimulator();
            drawMoonPhase();
            requestAnimationFrame(animate);
        }

        // ========== 分頁切換 ==========
        function switchTab(index) {
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');

            tabButtons.forEach(btn => btn.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));

            tabButtons[index].classList.add('active');
            tabContents[index].classList.add('active');

            if (index === 1) {
                initializePhasesGrid();
            } else if (index === 2) {
                if (document.getElementById('quizQuestions').innerHTML === '') {
                    initializeQuiz();
                }
            }
        }

        // ========== 區塊二：月相圖鑑初始化 ==========
        function initializePhasesGrid() {
            const grid = document.getElementById('phasesGrid');
            if (grid.innerHTML !== '') return;

            PHASES.forEach((phase, index) => {
                const card = document.createElement('div');
                card.className = 'phase-card';
                card.innerHTML = `
                    <div class="phase-canvas">
                        <canvas width="120" height="120" id="phase-canvas-${index}"></canvas>
                    </div>
                    <h3>${phase.name}</h3>
                    <div class="lunar-date">農曆 ${phase.lunarDate}</div>
                    <p class="phase-description">${PHASE_DESCRIPTIONS[phase.name]}</p>
                `;

                card.addEventListener('click', () => {
                    moonAngle = phase.angle;
                    switchTab(0);
                });

                grid.appendChild(card);

                // 繪製月相圖
                setTimeout(() => drawPhasePreview(index, phase.illumination), 0);
            });
        }

        function drawPhasePreview(index, illumination) {
            const canvas = document.getElementById(`phase-canvas-${index}`);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 50;

            // 清空背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製月球背面
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // 繪製照亮面
            ctx.fillStyle = '#FFD700';
            if (illumination > 50) {
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#999';
                const darkWidth = radius * 2 * (1 - illumination / 100);
                ctx.beginPath();
                ctx.ellipse(centerX - darkWidth / 2, centerY, darkWidth / 2, radius, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                const angle = Math.acos(1 - 2 * illumination / 100);
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, -angle, angle);
                ctx.fill();
            }

            // 邊框
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();
        }

        // ========== 區塊三：小測驗 ==========
        const QUIZ_QUESTIONS = [
            {
                type: 'image',
                question: '請看下面月相圖，這是哪一個月相？',
                illumination: 0,
                options: ['新月', '上弦月', '滿月', '下弦月'],
                correct: 0,
                explanation: '完全看不到月球的月相就是新月，此時月球在太陽和地球之間。'
            },
            {
                type: 'image',
                question: '根據月相圖，可見光面占50%的月相是什麼？',
                illumination: 50,
                options: ['眉月', '上弦月', '虧凸月', '殘月'],
                correct: 1,
                explanation: '可見光面占50%時，月球恰好在西邊90度方向，稱為上弦月。'
            },
            {
                type: 'image',
                question: '下圖的月相大約對應農曆哪個時期？',
                illumination: 100,
                options: ['初一到初七', '初七到十五', '十五到二十二', '二十二到三十'],
                correct: 2,
                explanation: '月球被完全照亮稱為滿月，通常出現在農曆十五至十六日。'
            },
            {
                type: 'concept',
                question: '月相變化的主要原因是什麼？',
                options: [
                    '地球的影子投在月球上',
                    '月球繞地球公轉，改變相對於太陽的位置，太陽照射角度不同',
                    '月球自轉速度改變',
                    '月球公轉速度改變'
                ],
                correct: 1,
                explanation: '月相變化是因為月球在繞地球公轉時，其相對於太陽的位置不斷改變，導致太陽對月球的照射角度不同，因此地球上看到的照亮面比例不同。這不是地球影子造成的。'
            },
            {
                type: 'concept',
                question: '上弦月（D形）的出沒時間特徵是什麼？',
                options: [
                    '日出升起，日落落下',
                    '正午升起，午夜落下',
                    '午夜升起，正午落下',
                    '日落升起，日出落下'
                ],
                correct: 1,
                explanation: '上弦月（D形）正午升起、午夜落下。這是因為上弦月在東方90°，當地球正午面向太陽時，月球也在天空中升起。'
            },
            {
                type: 'image',
                question: '這個月相中，月球已經進入滿月後的衰退期，照亮面開始減少，這是哪個月相？',
                illumination: 90,
                options: ['盈凸月', '虧凸月', '上弦月', '眉月'],
                correct: 1,
                explanation: '滿月後，照亮面開始減少，月面呈隆起狀稱為虧凸月（農曆二十二三日前後）。此時月球在西方，午夜升起、正午落下。'
            }
        ];

        function initializeQuiz() {
            const container = document.getElementById('quizQuestions');
            container.innerHTML = '';

            QUIZ_QUESTIONS.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'quiz-question';
                if (index === 0) div.classList.add('active');

                let optionsHtml = '<div class="options">';
                q.options.forEach((option, optIndex) => {
                    optionsHtml += `
                        <label class="option">
                            <input type="radio" name="question-${index}" value="${optIndex}" onchange="selectAnswer(${index}, ${optIndex})">
                            ${option}
                        </label>
                    `;
                });
                optionsHtml += '</div>';

                let questionHtml = '';
                if (q.type === 'image') {
                    questionHtml = `
                        <div class="question-number">第 ${index + 1} 題 (圖形辨識)</div>
                        <div class="question-text">${q.question}</div>
                        <div class="question-image">
                            <canvas id="quiz-canvas-${index}" width="200" height="200"></canvas>
                        </div>
                    `;
                } else {
                    questionHtml = `
                        <div class="question-number">第 ${index + 1} 題 (概念選擇)</div>
                        <div class="question-text">${q.question}</div>
                    `;
                }

                div.innerHTML = questionHtml + optionsHtml + `<div class="explanation" id="explanation-${index}"></div>`;
                container.appendChild(div);

                if (q.type === 'image') {
                    setTimeout(() => drawQuizPhase(index, q.illumination), 0);
                }
            });
        }

        function drawQuizPhase(index, illumination) {
            const canvas = document.getElementById(`quiz-canvas-${index}`);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 80;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFD700';
            if (illumination > 50) {
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#999';
                const darkWidth = radius * 2 * (1 - illumination / 100);
                ctx.beginPath();
                ctx.ellipse(centerX - darkWidth / 2, centerY, darkWidth / 2, radius, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                const angle = Math.acos(1 - 2 * illumination / 100);
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, -angle, angle);
                ctx.fill();
            }

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            const question = QUIZ_QUESTIONS[questionIndex];
            const isCorrect = optionIndex === question.correct;
            const options = document.querySelectorAll(`input[name="question-${questionIndex}"]`);

            // 移除之前的狀態
            document.querySelectorAll(`label[for="question-${questionIndex}"]`).forEach(label => {
                label.classList.remove('selected', 'correct', 'incorrect');
            });

            // 顯示解釋
            const explanationDiv = document.getElementById(`explanation-${questionIndex}`);
            explanationDiv.innerHTML = question.explanation;
            explanationDiv.className = `explanation show ${isCorrect ? 'correct' : 'incorrect'}`;

            // 更新樣式
            const parentLabels = document.querySelectorAll(`input[name="question-${questionIndex}"]`).forEach(input => {
                const label = input.parentElement;
                if (input.value == optionIndex) {
                    label.classList.add('selected');
                    if (isCorrect) {
                        label.classList.add('correct');
                    } else {
                        label.classList.add('incorrect');
                    }
                }
            });

            // 如果答對，高亮正確答案
            if (!isCorrect) {
                const correctInput = document.querySelector(`input[name="question-${questionIndex}"][value="${question.correct}"]`);
                if (correctInput) {
                    correctInput.parentElement.classList.add('correct');
                }
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < QUIZ_QUESTIONS.length - 1) {
                currentQuestionIndex++;
                updateQuizDisplay();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                updateQuizDisplay();
            }
        }

        function updateQuizDisplay() {
            const questions = document.querySelectorAll('.quiz-question');
            questions.forEach((q, index) => {
                q.classList.toggle('active', index === currentQuestionIndex);
            });

            document.getElementById('questionCount').textContent = `第 ${currentQuestionIndex + 1} 題 / 共 ${QUIZ_QUESTIONS.length} 題`;
            document.getElementById('progressFill').style.width = `${((currentQuestionIndex + 1) / QUIZ_QUESTIONS.length) * 100}%`;

            document.getElementById('prevBtn').style.display = currentQuestionIndex === 0 ? 'none' : 'block';
            document.getElementById('nextBtn').style.display = currentQuestionIndex === QUIZ_QUESTIONS.length - 1 ? 'none' : 'block';
            document.getElementById('submitBtn').style.display = currentQuestionIndex === QUIZ_QUESTIONS.length - 1 ? 'block' : 'none';
        }

        function submitQuiz() {
            quizSubmitted = true;
            let score = 0;

            QUIZ_QUESTIONS.forEach((q, index) => {
                if (userAnswers[index] === q.correct) {
                    score++;
                }
            });

            const totalScore = Math.round((score / QUIZ_QUESTIONS.length) * 100);
            document.getElementById('scoreDisplay').textContent = `${totalScore} 分`;

            let feedback = '';
            if (totalScore >= 90) {
                feedback = '🌟 優秀！你對月相的理解非常深入！';
            } else if (totalScore >= 80) {
                feedback = '👍 很好！你已經掌握了月相的主要概念！';
            } else if (totalScore >= 70) {
                feedback = '📚 不錯！建議多複習一些月相知識。';
            } else if (totalScore >= 60) {
                feedback = '💪 加油！再仔細學習月相變化的原理。';
            } else {
                feedback = '🤔 需要加強學習。建議從軌道模擬器開始理解月相原理。';
            }

            document.getElementById('feedbackMessage').textContent = feedback;
            document.getElementById('feedbackDetail').innerHTML = `
                你答對了 <strong>${score} / ${QUIZ_QUESTIONS.length}</strong> 題。
            `;

            document.getElementById('results').classList.add('show');
            document.getElementById('quizQuestions').style.display = 'none';
            document.getElementById('prevBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            userAnswers = {};
            quizSubmitted = false;

            document.getElementById('results').classList.remove('show');
            document.getElementById('quizQuestions').style.display = 'block';

            document.querySelectorAll('.quiz-question').forEach((q, index) => {
                q.classList.toggle('active', index === 0);
                q.querySelectorAll('input[type="radio"]').forEach(input => {
                    input.checked = false;
                });
                q.querySelectorAll('.option').forEach(option => {
                    option.classList.remove('selected', 'correct', 'incorrect');
                });
                document.getElementById(`explanation-${index}`).classList.remove('show');
            });

            updateQuizDisplay();
        }

        // ========== 初始化 ==========
        window.addEventListener('DOMContentLoaded', function() {
            animate();
        });
    </script>
</body>
